                    </button>
</div>
<div class="relative">
<select class="w-full bg-white border-outline-variant rounded-lg py-sm pl-sm pr-md appearance-none text-on-surface focus:ring-primary focus:border-primary">

<!-- Floating Micro-interaction Background -->
<div class="fixed inset-0 -z-10 overflow-hidden pointer-events-none opacity-20">
<div class="absolute top-[-10%] right-[-10%] w-64 h-64 bg-primary/20 blur-[100px] rounded-full"></div>
<div class="absolute bottom-[10%] left-[-5%] w-80 h-80 bg-tertiary/20 blur-[100px] rounded-full"></div>
</div>
<script>
        // Micro-interaction for form focus
        document.querySelectorAll('input, select').forEach(el => {
            el.addEventListener('focus', () => {
                el.closest('.bento-card')?.classList.add('ring-2', 'ring-primary/20', 'border-primary');
            });
            el.addEventListener('blur', () => {
                el.closest('.bento-card')?.classList.remove('ring-2', 'ring-primary/20', 'border-primary');
            });
        });

        // Simple feedback for action buttons
        document.querySelector('button.bg-primary').addEventListener('click', function() {
            const originalText = this.innerHTML;
            this.innerHTML = '<span class="material-symbols-outlined animate-spin">sync</span> Guardando...';
            setTimeout(() => {
                this.innerHTML = '<span class="material-symbols-outlined">check_circle</span> Guardado';
                setTimeout(() => {
                    this.innerHTML = originalText;
                }, 2000);
            }, 1000);
        });
    </script>
