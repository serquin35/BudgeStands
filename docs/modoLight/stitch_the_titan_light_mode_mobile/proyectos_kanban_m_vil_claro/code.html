<script>
        // Simple micro-interaction for active states and haptic-like feel
        document.querySelectorAll('button, a').forEach(el => {
            el.addEventListener('click', (e) => {
                // Potential for adding ripple effects or sound if needed
            });
        });

        // Intersection observer for card entrance animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add('opacity-100', 'translate-y-0');
                    entry.target.classList.remove('opacity-0', 'translate-y-4');
                }
            });
        }, { threshold: 0.1 });

        document.querySelectorAll('.shadow-sm').forEach(card => {
            card.classList.add('transition-all', 'duration-500', 'opacity-0', 'translate-y-4');
            observer.observe(card);
        });
    </script>
